<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Payment Gateway Testing</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #0F172A;
            --surface: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border: #334155;
            --success: #10B981;
            --error: #EF4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(135deg, #A78BFA, #4F46E5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button {
            width: 100%;
            padding: 0.875rem 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .log-area {
            margin-top: 2rem;
            background-color: #000000;
            border-radius: 8px;
            padding: 1rem;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }

        .log-entry {
            margin-bottom: 0.5rem;
            word-wrap: break-word;
        }

        .log-info { color: #60A5FA; }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
        
        .balance-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(79, 70, 229, 0.1);
            border: 1px solid rgba(79, 70, 229, 0.2);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        
        .balance-card .label {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        .balance-card .value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--success);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Payment Tester</h1>
        <p class="subtitle">Integration Testing for Razorpay Wallet Flow</p>

        <div class="balance-card">
            <span class="label">Current Balance:</span>
            <span class="value" id="balanceValue">₹ -.--</span>
        </div>

        <div class="form-group">
            <label for="apiUrl">API Base URL</label>
            <input type="text" id="apiUrl" value="http://localhost:8000/api/v1/wallets" placeholder="e.g. http://localhost:8000/api/v1/wallets">
        </div>

        <div class="form-group">
            <label for="authToken">Vendor Auth Token (Bearer)</label>
            <input type="text" id="authToken" placeholder="Paste your JWT token here">
        </div>

        <div class="form-group">
            <label for="amount">Deposit Amount (INR)</label>
            <input type="number" id="amount" value="100" min="1" step="1">
        </div>

        <button id="checkBalanceBtn">Check Balance</button>
        <button id="payBtn">Add Money via Razorpay</button>

        <div class="log-area" id="logArea">
            <div class="log-entry log-info">System ready. Enter token to begin testing.</div>
        </div>
    </div>

    <!-- Razorpay Checkout JS -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        const apiUrlPath = document.getElementById('apiUrl');
        const tokenInput = document.getElementById('authToken');
        const amountInput = document.getElementById('amount');
        const payBtn = document.getElementById('payBtn');
        const checkBalanceBtn = document.getElementById('checkBalanceBtn');
        const logArea = document.getElementById('logArea');
        const balanceValue = document.getElementById('balanceValue');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            div.textContent = `[${time}] ${msg}`;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        async function fetchBalance() {
            const token = tokenInput.value.trim();
            const baseUrl = apiUrlPath.value.trim();
            
            if (!token) {
                log('Please enter an Auth Token first.', 'error');
                return;
            }

            try {
                log('Fetching balance...', 'info');
                const response = await fetch(`${baseUrl}/balance`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    balanceValue.textContent = `₹ ${data.data.balance}`;
                    log(`Balance fetched: ₹${data.data.balance}`, 'success');
                } else {
                    log(`Failed to fetch balance: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (err) {
                log(`Network error: ${err.message}`, 'error');
            }
        }

        checkBalanceBtn.addEventListener('click', fetchBalance);

        payBtn.addEventListener('click', async () => {
            const token = tokenInput.value.trim();
            const baseUrl = apiUrlPath.value.trim();
            const amount = parseFloat(amountInput.value);

            if (!token) {
                log('Please enter an Auth Token first.', 'error');
                return;
            }

            if (!amount || amount <= 0) {
                log('Please enter a valid amount.', 'error');
                return;
            }

            payBtn.disabled = true;
            payBtn.textContent = 'Processing...';

            try {
                // Step 1: Call Add Money API to create Razorpay Order
                log('Creating order on backend...', 'info');
                const response = await fetch(`${baseUrl}/add-money`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ amount })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.message || 'Order creation failed');
                }

                const orderData = data.data;
                log(`Order created successfully: ${orderData.orderId}`, 'success');

                // Step 2: Open Razorpay Checkout
                const options = {
                    key: orderData.keyId,
                    amount: orderData.amount, // already in paise
                    currency: orderData.currency,
                    name: "AsiaBus Admin",
                    description: "Wallet Deposit",
                    order_id: orderData.orderId,
                    handler: async function (response) {
                        log('Payment successful. Verifying signature on backend...', 'info');
                        // Step 3: Verify Payment
                        verifyPayment(response, token, baseUrl);
                    },
                    prefill: {
                        name: "Test Vendor",
                        email: "vendor@example.com",
                        contact: "9999999999"
                    },
                    theme: {
                        color: "#4F46E5"
                    }
                };

                const rzp = new Razorpay(options);
                
                rzp.on('payment.failed', function (response){
                    log(`Payment failed: ${response.error.description}`, 'error');
                });

                rzp.open();

            } catch (err) {
                log(`Error: ${err.message}`, 'error');
            } finally {
                payBtn.disabled = false;
                payBtn.textContent = 'Add Money via Razorpay';
            }
        });

        async function verifyPayment(paymentData, token, baseUrl) {
            try {
                const response = await fetch(`${baseUrl}/verify-payment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        razorpay_order_id: paymentData.razorpay_order_id,
                        razorpay_payment_id: paymentData.razorpay_payment_id,
                        razorpay_signature: paymentData.razorpay_signature
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    log(`Wallet credited successfully! New Balance: ₹${data.data.balance}`, 'success');
                    balanceValue.textContent = `₹ ${data.data.balance}`;
                } else {
                    log(`Verification failed: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (err) {
                log(`Verification Network error: ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
